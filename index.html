

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Locked Screen</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            
            /* خلفية متدرجة أخضر احترافي */
            background: linear-gradient(135deg, #0f9b0f, #1ed760);
        }

        .box {
            text-align: center;
            padding: 40px 60px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }

        .text {
            color: white;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .sub {
            color: #eaffea;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="text">Locked for a while</div>
        <div class="sub">Please wait...</div>
    </div>

</body>
</html>
